<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #0a7764; --teal-light: #e0f4ef; --teal-mid: #1d9e75;
    --navy: #0d2137; --cream: #faf8f4; --text: #1a2a35;
    --text-muted: #5a6a75; --border: rgba(0,0,0,0.08); --radius: 16px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  nav { position: sticky; top: 0; z-index: 100; background: rgba(250,248,244,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; }
  .nav-logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--teal); text-decoration: none; }
  .nav-links { display: flex; gap: 8px; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; padding: 6px 14px; border-radius: 50px; transition: all 0.2s; }
  .nav-links a:hover, .nav-links a.active { background: var(--teal-light); color: var(--teal); }

  .page { max-width: 960px; margin: 0 auto; padding: 50px 40px 80px; }
  .page-tag { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 38px; color: var(--navy); letter-spacing: -0.5px; margin-bottom: 10px; }
  .page-subtitle { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 36px; }

  .search-bar { width: 100%; padding: 13px 18px; border-radius: 10px; border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: white; outline: none; transition: border-color 0.2s; margin-bottom: 36px; display: block; }
  .search-bar:focus { border-color: var(--teal-mid); }

  .system { margin-bottom: 12px; border-radius: var(--radius); border: 1px solid var(--border); background: white; overflow: hidden; transition: box-shadow 0.2s; }
  .system:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

  .system-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; cursor: pointer; user-select: none; list-style: none; gap: 12px; }
  .system-header::-webkit-details-marker { display: none; }
  .system-header-left { display: flex; align-items: center; gap: 14px; }
  .system-icon { font-size: 22px; width: 42px; height: 42px; border-radius: 10px; background: var(--teal-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .system-title { font-size: 16px; font-weight: 500; color: var(--navy); }
  .system-count { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .system-chevron { color: var(--text-muted); font-size: 12px; transition: transform 0.3s; flex-shrink: 0; }
  details[open] .system-chevron { transform: rotate(180deg); }

  .cards-wrap { padding: 0 20px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; animation: fadeDown 0.25s ease; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .card { background: var(--cream); border-radius: 12px; border: 1px solid var(--border); padding: 18px 20px; transition: all 0.2s; }
  .card:hover { border-color: var(--teal-mid); background: white; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
  .card-name { font-size: 15px; font-weight: 500; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-name::before { content: ''; width: 3px; height: 14px; background: var(--teal-mid); border-radius: 99px; display: inline-block; flex-shrink: 0; }

  .fact-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .fact-label { font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: white; background: var(--teal-mid); padding: 2px 7px; border-radius: 4px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .fact-label.inv { background: #6c63a8; }
  .fact-label.mx { background: #c0392b; }
  .fact-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .fact-text strong { color: var(--text); font-weight: 500; }

  .high-yield { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: #b45309; background: #fef3c7; padding: 2px 8px; border-radius: 4px; margin-left: auto; }

  .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 15px; }
  .no-results span { font-size: 36px; display: block; margin-bottom: 12px; }

  footer { border-top: 1px solid var(--border); padding: 24px 40px; text-align: center; font-size: 13px; color: var(--text-muted); }

  @media (max-width: 700px) {
    nav { padding: 0 20px; } .nav-links { display: none; }
    .page { padding: 36px 20px 60px; } .page-title { font-size: 30px; }
    .cards-wrap { grid-template-columns: 1fr; padding: 0 14px 14px; }
    .system-header { padding: 16px 18px; }
  }
</style>

function render(filter) {
  const q = (filter || '').toLowerCase().trim();
  const container = document.getElementById('systemsContainer');
  let anyVisible = false;

      ? sys.conditions.filter(c =>
          c.name.toLowerCase().includes(q) ||
          (c.px||'').toLowerCase().includes(q) ||
          (c.mx||'').toLowerCase().includes(q)
        )
      : sys.conditions;

    if (filtered.length === 0) return '';
    anyVisible = true;

    const cardsHTML = filtered.map(c => `
      <div class="card">
        <div class="card-name">
          ${c.name}
          ${c.highYield ? '<span class="high-yield">⚡ High yield</span>' : ''}
